<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topo">
<h2>Gestor Master</h2>
</div>

<div class="perfil-topo">
<span>👤 admin</span>
<span id="creditosTopo">💰 ...</span>
</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="screen.html">Clientes</a>
<a href="revendedores.html">Revendedores</a>
<a href="creditos.html">Créditos</a>
</div>

<div class="container">

<div class="cards-linha">

<div class="card">
<h3>Créditos</h3>
<div id="creditos">0</div>
</div>

<div class="card">
<h3>Total de Clientes</h3>
<div id="totalClientes">0</div>
</div>

<div class="card">
<h3>Revendedores</h3>
<div id="totalRevendedores">0</div>
</div>

<div class="card">
<h3>Vencendo Hoje</h3>
<div id="vencendoHoje">0</div>
</div>

</div>

<!-- 🔥 NOVO BLOCO PROFISSIONAL -->
<div class="cards-linha">

<div class="card">
<h3>Clientes Ativos</h3>
<div id="clientesAtivos">0</div>
</div>

<div class="card">
<h3>Clientes Vencidos</h3>
<div id="clientesVencidos">0</div>
</div>

</div>

</div>

<script>

async function carregar(){

const res = await fetch("/dashboard-info");
const d = await res.json();

/* PRINCIPAIS */
document.getElementById("creditos").innerText = d.creditos || 0;
document.getElementById("totalClientes").innerText = d.totalClientes || 0;
document.getElementById("totalRevendedores").innerText = d.totalRevendedores || 0;
document.getElementById("vencendoHoje").innerText = d.vencendoHoje || 0;

/* NOVOS */
document.getElementById("clientesAtivos").innerText = d.clientesAtivos || 0;
document.getElementById("clientesVencidos").innerText = d.clientesVencidos || 0;

}

carregar();

</script>

</body>
</html>
