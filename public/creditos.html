<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Créditos</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

.topo{
background:#111;
color:white;
padding:15px;
}

.menu{
background:#222;
padding:10px;
}

.menu a{
color:white;
margin-right:20px;
text-decoration:none;
}

.container{
padding:20px;
}

</style>

</head>

<body>

<div class="topo">
<h2>Gestor Master</h2>
</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="screen.html">Clientes</a>
<a href="revendedores.html">Revendedores</a>
<a href="creditos.html">Créditos</a>
</div>

<div class="container">

<div class="card">
<h3>Créditos disponíveis</h3>
<div id="creditos">Carregando...</div>
</div>

</div>

<script>

const usuario = localStorage.getItem("usuario");

async function carregar(){

const res = await fetch("/creditos/" + usuario);
const data = await res.json();

document.getElementById("creditos").innerText = data.creditos;

}

carregar();

</script>

</body>
</html>
