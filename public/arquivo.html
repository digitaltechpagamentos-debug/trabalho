<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Gestor Master</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

.topo{
background:#111;
color:white;
padding:15px;
}

.menu{
background:#222;
padding:10px;
}

.menu a{
color:white;
margin-right:20px;
text-decoration:none;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

button{
padding:8px 12px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="topo">
<h2>Gestor Master</h2>
</div>

<div class="menu">
<div style="display:flex;gap:20px;margin:20px 0">

<div class="card" style="flex:1;background:#2563eb;color:white">
<h3>Total de Clientes</h3>
<h2 id="totalClientes">0</h2>
</div>

<div class="card" style="flex:1;background:#22c55e;color:white">
<h3>Clientes Ativos</h3>
<h2 id="clientesAtivos">0</h2>
</div>

<div class="card" style="flex:1;background:#ef4444;color:white">
<h3>Clientes Vencidos</h3>
<h2 id="clientesVencidos">0</h2>
</div>

<div class="card" style="flex:1;background:#f59e0b;color:white">
<h3>Revendedores</h3>
<h2 id="totalRevendedores">0</h2>
</div>

</div>
<a href="/dashboard.html">Dashboard</a>
<a href="/clientes.html">Clientes</a>
<a href="/revendedores.html">Revendedores</a>

</div>

<div class="container">

<div class="card">

<h3>Cadastrar Cliente</h3>

<input id="nome" placeholder="Nome do cliente">
<input id="usuario" placeholder="Usuário">
<input id="senha" placeholder="Senha">

<button onclick="criar()">Salvar</button>

</div>

<div class="card">

<h3>Clientes</h3>

</div>

</div>

<script>
    async function carregarDashboard(){

const res = await fetch("/dashboard-info");

const dados = await res.json();

document.getElementById("totalClientes").innerText = dados.totalClientes;
document.getElementById("clientesAtivos").innerText = dados.clientesAtivos;
document.getElementById("clientesVencidos").innerText = dados.clientesVencidos;
document.getElementById("totalRevendedores").innerText = dados.totalRevendedores;

}

async function carregar(){

const res = await fetch("/clientes");
const dados = await res.json();

let html="";

dados.forEach(c=>{

html+=`
<div>

${c.nome} - ${c.usuario}

<button onclick="excluir('${c.id}')">Excluir</button>

</div>
`;

});

document.getElementById("lista").innerHTML=html;

}

async function criar(){

const nome = document.getElementById("nome").value;
const usuario = document.getElementById("usuario").value;
const senha = document.getElementById("senha").value;

await fetch("/criar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({nome,usuario,senha})
});

carregar();

}

async function excluir(id){

await fetch("/excluir-cliente",{
method:"POST",
headers: {"contente-Type":"aplication/json"},
body: JSON.stringify({ id})
});

carregar();

}

carregar();
carregarDashboard();

</script>

</body>
</html>
