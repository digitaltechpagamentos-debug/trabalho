<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#020617,#1d4ed8);
font-family:Arial;
}

.box{
background:#0f172a;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
color:white;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
background:#1e293b;
border:none;
color:white;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.erro{
color:red;
text-align:center;
}
</style>

</head>

<body>

<div class="box">

<h2>Gestor Master</h2>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<div id="erro" class="erro"></div>

</div>

<script>
async function login(){

const usuario = document.getElementById("usuario").value.trim();
const senha = document.getElementById("senha").value.trim();

try{

const res = await fetch("/login", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ usuario, senha })
});

if(res.status === 200){

const data = await res.json();

localStorage.setItem("usuario", data.usuario);

window.location = "dashboard.html";

}else{

document.getElementById("erro").innerText = "Usuário ou senha inválidos";

}

}catch(e){

document.getElementById("erro").innerText = "Erro ao conectar com servidor";

}

}
</script>

</body>
</html>
