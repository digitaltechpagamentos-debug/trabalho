<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#020617,#1d4ed8);
font-family:Arial;
}

.box{
background:#0f172a;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
color:white;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
background:#1e293b;
border:none;
color:white;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.erro{
color:red;
text-align:center;
}
</style>

</head>

<body>

<div class="box">

<h2>Gestor Master</h2>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<div id="erro" class="erro"></div>

</div>

<!-- 🔥 1. IMPORTA SUPABASE PRIMEIRO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- 🔥 2. CRIA CONEXÃO -->
<script>
const supabase = window.supabase.createClient(
"https://gcqahmegpidkgedokbaa.supabase.co",
"sb_publishable_Hdwuix4_G8H1l1ywDiSa0g_27Ut_b4R"
);
</script>

<script>
async function login(){

const usuario = document.getElementById("usuario").value.trim();
const senha = document.getElementById("senha").value.trim();

const { data, error } = await supabase
.from("usuarios")
.select("*")
.eq("usuario", usuario);

console.log("DATA:", data, "ERROR:", error);

if (!data || data.length === 0){

document.getElementById("erro").innerText ="Usuário não encontrado";

return;

}

const user = data[0];

if (user.senha !== senha){

document.getElementById("erro").innerText ="Senha incorreta";

return;

}

localStorage.setItem("usuario", user.usuario);

window.location = "dashboard.html";

}
</script>
